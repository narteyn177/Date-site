<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> Check this out 💖 </title>

  <style>
    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffe6f0;
      text-align: center;
    }

    .page {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .active {
      display: flex;
    }

    h1 {
      color: #d63384;
    }

    .box {
      position: relative;
      width: 300px;
      height: 200px;
      margin-top: 20px;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      position: absolute;
    }

    #yes {
      background: #28a745;
      color: white;
      left: 40px;
      top: 60px;
    }

    #no {
      background: #dc3545;
      color: white;
      left: 160px;
      top: 60px;
      transition: 0.08s;
    }

    .big {
      font-size: 32px;
      color: #d63384;
    }

    .time {
      font-size: 24px;
      color: #333;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <h1>Hey, My Very Own 💖</h1>
  <h1>Will you go on a date with me? 💖</h1>

  <div class="box">
    <button id="yes">Yes 😍</button>
    <button id="no">No 😭</button>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="big">YAYYY!! 💖🎉</div>
  <div class="time">Get ready for your date at</div>
  <h1>7:00 PM ⏰</h1>
</div>

<script>
  const noBtn = document.getElementById("no");
  const yesBtn = document.getElementById("yes");

  const page1 = document.getElementById("page1");
  const page2 = document.getElementById("page2");

  // moving NO button
  function moveButton() {
  const box = document.querySelector(".box");

  const maxX = box.clientWidth - 100;
  const maxY = box.clientHeight - 60;

  noBtn.style.left = Math.random() * maxX + "px";
  noBtn.style.top = Math.random() * maxY + "px";
}

// laptop (mouse)
noBtn.addEventListener("mouseover", moveButton);

// phone (touch)
noBtn.addEventListener("touchstart", moveButton);
  // YES button click
  yesBtn.addEventListener("click", () => {
    alert("Yayyy 💖 I knew you'd say yes!");

    page1.classList.remove("active");
    page2.classList.add("active");
  });
</script>

</body>
</html>
